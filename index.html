<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Parameter iFrame Widget</title>
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self' https://js.jotform.com;
      script-src 'self' https://js.jotform.com;
      style-src 'self';
      img-src 'self' data:;
      frame-src https: http:;
      connect-src 'self';
      base-uri 'none';
      form-action 'none';
    "
  />
  <link rel="stylesheet" href="./styles.css" />
  <script
    src="https://js.jotform.com/JotFormCustomWidget.min.js"
    defer
  ></script>
  <script src="./widget.js" defer></script>
</head>
<body>
  <main class="app">
    <div id="status" class="status status--info" role="status" aria-live="polite">
      Loading widget…
    </div>

    <details id="debugPanel" class="debug" open>
      <summary>Debug log</summary>
      <pre id="debugLog" class="debug__log">Waiting for widget startup...</pre>
    </details>

    <iframe
      id="embeddedFrame"
      class="frame"
      title="Embedded content"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </main>

  <noscript>
    <div class="status status--error">
      This widget requires JavaScript to run.
    </div>
  </noscript>
</body>
</html>
